<!DOCTYPE html>
<html>
<head><title>测试搜索页</title></head>
<body>
    <input id="search_box" type="text" />
    <button id="search_btn">搜索</button>
    <div id="results" style="display:none;">
        <div class="result-item"><a href="/result1">结果1</a></div>
        <div class="result-item"><a href="/result2">结果2</a></div>
        <div class="result-item"><a href="/result3">结果3</a></div>
    </div>
    <script>
        document.getElementById("search_btn").addEventListener("click", function() {
            document.getElementById("results").style.display = "block";
            document.title = "搜索结果 - " + document.getElementById("search_box").value;
        });
    </script>
</body>
</html>
